# Submodule `infra` is not part of the parent tree; `include:local` cannot see those paths on GitLab.
# Pin `ref` to match: `git ls-tree HEAD infra` (update both when bumping the submodule).
include:
  - project: public-work4/infra
    ref: 13d9e8c738d123c54db007f9adb7de0c042be43f
    file:
      - ci/templates/fragments/toolchain-node-pnpm.gitlab-ci.yml
      - ci/templates/deploy-gitlab-pages.gitlab-ci.yml

default:
  interruptible: true

stages:
  - lint
  - typecheck
  - build
  - deploy

variables:
  NODE_ENV: production
  PNPM_CACHE_FOLDER: .pnpm-store

# jobs-quality on this infra ref targets monorepos (`pnpm --filter web`); keep project jobs aligned with prior CI.
.rule_skip_mr:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: on_success

lint:
  stage: lint
  extends:
    - .node18_pnpm_devdeps
    - .rule_skip_mr
  script:
    - pnpm run lint

typecheck:
  stage: typecheck
  extends:
    - .node18_pnpm_devdeps
    - .rule_skip_mr
  script:
    - pnpm run typecheck

# Named build_job so deploy-gitlab-pages.pages can depend on it.
build_job:
  stage: build
  extends:
    - .node18_pnpm_devdeps
    - .rule_skip_mr
  script:
    - pnpm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
